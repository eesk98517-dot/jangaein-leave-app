                                            <div key={i} className="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center hover:shadow-md transition">
                                                <div><p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">{s.label}</p><span className="text-2xl font-black text-slate-800">{s.value}</span><span className="text-sm font-bold text-slate-400 ml-1">{s.unit}</span></div>
                                                <div className={`p-3 rounded-xl ${s.color} bg-opacity-50`}>{s.icon}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex flex-col">
                                            <h3 className="font-bold text-slate-700 flex items-center gap-2 mb-6"><Icons.Grid /> 연도별 연차 소진율 추이</h3>
                                            <div className="flex-1 flex items-end justify-around gap-4 h-64 pb-2 border-b border-slate-100">
                                                {yearlyStats.map((stat) => (
                                                    <div key={stat.year} className="flex flex-col items-center group w-full h-full justify-end">
                                                        <div className="relative w-full max-w-[60px] h-full bg-slate-100 rounded-t-lg overflow-hidden">
                                                            <div 
                                                                className="absolute bottom-0 w-full bg-cyan-500 rounded-t-lg shadow-lg group-hover:bg-cyan-600 bar-transition min-h-[1px]" 
                                                                style={{ height: `${stat.rate}%` }}
                                                            >
                                                                <span className="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition shadow-lg font-bold z-10">{stat.rate}%</span>
                                                            </div>
                                                        </div>
                                                        <span className="mt-3 text-sm font-bold text-slate-500">{stat.year}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
                                                <h3 className="font-bold text-slate-700 flex items-center gap-2 mb-4"><span className="w-2 h-6 bg-orange-400 rounded-sm"></span> 금일 부재 현황</h3>
                                                <div className="space-y-3 max-h-48 overflow-y-auto no-scrollbar">
                                                    {activeStaffList.filter(s => s.leaveHistory?.some(r => r.date === todayStr)).length > 0 ? (
                                                        activeStaffList.filter(s => s.leaveHistory?.some(r => r.date === todayStr)).map(s => (
                                                            <div key={s.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                                <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full bg-white border flex items-center justify-center text-sm font-bold text-slate-600 shadow-sm">{s.name[0]}</div><div><p className="text-sm font-bold text-slate-800">{s.name}</p><p className="text-xs text-slate-500 font-medium mt-0.5">휴가 중</p></div></div><span className="px-3 py-1 rounded-lg text-xs font-bold bg-orange-100 text-orange-700">휴가</span>
                                                            </div>
                                                        ))
                                                    ) : (<p className="text-slate-400 text-sm text-center py-8">금일 휴가자가 없습니다.</p>)}
                                                </div>
                                            </div>
                                            <div className="bg-cyan-600 rounded-2xl p-6 text-white shadow-lg shadow-cyan-200">
                                                <h3 className="font-bold text-lg mb-1">빠른 연차 등록</h3>
                                                <p className="text-cyan-100 text-sm mb-4">관리자가 직원의 연차를 대리 등록합니다.</p>
                                                <button onClick={() => setShowLeaveModal(true)} className="w-full bg-white text-cyan-700 py-3 rounded-xl text-sm font-bold hover:bg-cyan-50 transition">+ 연차 등록하기</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'leave' && <LeaveManagementTab staffList={activeStaffList} onOpenModal={() => setShowLeaveModal(true)} onEditClick={handleEditLeave} onNameClick={setViewingStaffDetail} />}
                            {activeTab === 'past_leave' && <LeaveManagementTab staffList={activeStaffList} onOpenModal={() => setShowLeaveModal(true)} onEditClick={handleEditLeave} isPastMode={true} onNameClick={setViewingStaffDetail} />}
                            {activeTab === 'promotion' && <PromotionTab staffList={activeStaffList} />}
                            {activeTab === 'resigned' && <ResignedStaffTab staffList={staffList} onOpenModal={setShowLeaveModal} onEditClick={handleEditLeave} onNameClick={setViewingStaffDetail} />}
                            {activeTab === 'staff' && <StaffTab staffList={staffList} />}
                        </main>
                        {showLeaveModal && <LeaveActionModal staffList={activeStaffList} onClose={closeLeaveModal} initialData={editingLeaveData} />}
                        {viewingStaffDetail && <StaffDetailModal staff={viewingStaffDetail} onClose={() => setViewingStaffDetail(null)} />}
                        
                        {/* [추가됨] 시스템 업데이트 모달 노출 */}
                        {showUpdateNotice && <UpdateNoticeModal onClose={() => setShowUpdateNotice(false)} />}
                    </ErrorBoundary>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
