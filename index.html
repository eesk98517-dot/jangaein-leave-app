<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장애인사회연구소 연차 관리 시스템</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin="anonymous"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input[type="checkbox"] { width: 1.1rem; height: 1.1rem; cursor: pointer; accent-color: #06b6d4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        th { user-select: none; }
        .bar-transition { transition: height 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex h-screen items-center justify-center flex-col gap-4 text-slate-400">
            <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold">시스템 데이터 동기화 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Component } = React;
        const { createRoot } = ReactDOM;

        // --- Firebase Config (장애인사회연구소 전용) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBVctn4u9uScp3b34ATrq7__XcC59wRoAI",
            authDomain: "jangaein-leave-app.firebaseapp.com",
            projectId: "jangaein-leave-app",
            storageBucket: "jangaein-leave-app.firebasestorage.app",
            messagingSenderId: "222413607751",
            appId: "1:222413607751:web:a506c717101acfc7d97262",
            measurementId: "G-5RJFKK90NJ"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Helper Functions ---
        const safeParseFloat = (val) => { const num = parseFloat(val); return isNaN(num) ? 0 : num; };
        const fmt = (num) => { if (num === undefined || num === null || isNaN(num)) return '0'; return Number(Number(num).toFixed(2)); };
        const normalizeString = (str) => String(str || '').replace(/[\s\-\.\/]/g, '').trim();

        const toLocalYMD = (date) => {
            if (!date || isNaN(date.getTime())) return '';
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const safeDate = (val) => {
            if (!val) return '';
            let str = String(val).trim().replace(/[\.\/]/g, '-');
            const parts = str.split('-');
            if (parts.length === 3) {
                const y = parts[0]; const m = parts[1].padStart(2, '0'); const d = parts[2].padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            if (/^\d{5,6}$/.test(str)) {
                const n = parseInt(str);
                if (n > 20000 && n < 60000) {
                    try {
                        const date = new Date((n - 25569) * 86400 * 1000);
                        date.setHours(date.getHours() + 9);
                        return toLocalYMD(date);
                    } catch(e) { return str; }
                }
            }
            if (str.length === 8 && !isNaN(str)) { return `${str.substring(0,4)}-${str.substring(4,6)}-${str.substring(6,8)}`; }
            return str;
        };

        // 회계연도 기준 연차 자동 산정 로직 적용 (1월 1일 ~ 12월 31일)
        const calculateLeaveForYear = (joinDateStr, targetYear) => {
            if (!joinDateStr || joinDateStr.length < 10) return { total: 0, period: '-', startDate: '', endDate: '', notJoined: true };
            
            const [jYear, jMonth, jDay] = joinDateStr.split('-').map(Number);
            const joinDate = new Date(jYear, jMonth - 1, jDay);
            
            if (isNaN(joinDate.getTime())) return { total: 0, period: '-', startDate: '', endDate: '', notJoined: true };
            if (jYear > targetYear) return { total: 0, period: '입사 전', notJoined: true };

            // 회계연도는 무조건 1월 1일부터 12월 31일까지
            let startDate = new Date(targetYear, 0, 1);
            let endDate = new Date(targetYear, 11, 31);
            
            // 입사 당해연도인 경우, 시작일은 입사일 당일
            if (jYear === targetYear) {
                startDate = new Date(jYear, jMonth - 1, jDay);
            }

            let yearsWorked = targetYear - jYear;
            let totalLeave = 0;

            if (yearsWorked === 0) {
                // 1년차 (입사 당해)
                totalLeave = 12 - jMonth + (jDay === 1 ? 1 : 0);
                if (totalLeave > 11) totalLeave = 11;
                if (totalLeave < 0) totalLeave = 0;
            } else if (yearsWorked === 1) {
                // 2년차 (첫 1월 1일)
                const daysInJoinYear = Math.floor((new Date(jYear, 11, 31) - joinDate) / (1000 * 60 * 60 * 24)) + 1;
                totalLeave = Math.round((15 * daysInJoinYear / 365) * 10) / 10;
            } else {
                // 3년차 이상
                totalLeave = 15 + Math.floor((yearsWorked - 2) / 2);
                if (totalLeave > 25) totalLeave = 25;
            }
            
            const sStr = toLocalYMD(startDate);
            const eStr = toLocalYMD(endDate);

            return { total: totalLeave, period: `${sStr} ~ ${eStr}`, startDate: sStr, endDate: eStr, notJoined: false, yearsWorked };
        };

        const calculateAnnualLeave = (joinDateStr) => {
            if(!joinDateStr) return { total: 0, period: '-' };
            const today = new Date();
            // 회계연도는 무조건 현재 연도를 기준으로 합니다.
            return calculateLeaveForYear(joinDateStr, today.getFullYear());
        };

        const getPromotionStatus = (staff) => {
            if (!staff.joinDate) return null;
            const leaveInfo = calculateAnnualLeave(staff.joinDate);
            if (leaveInfo.notJoined) return null;
            const today = new Date();
            const currentMonth = today.getMonth() + 1; 
            const currentYear = today.getFullYear();
            
            // 회계연도는 무조건 12월 31일 만료이므로, 7월(6개월 전), 11월(2개월 전)에 고정 촉진
            if (leaveInfo.yearsWorked < 1) {
                if (currentMonth === 10) return { type: '1년미만 1차', msg: '만료 3개월 전 (10월)', color: 'bg-purple-100 text-purple-700' };
            } else {
                if (currentMonth === 7) return { type: '1차 촉진', msg: '만료 6개월 전 (7월)', color: 'bg-cyan-100 text-cyan-700' };
                if (currentMonth === 11) return { type: '2차 촉진', msg: '만료 2개월 전 (11월)', color: 'bg-red-100 text-red-700' };
            }
            return null;
        };

        // --- Icons ---
        const Icons = {
            Grid: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
            Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Calendar: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            CheckCircle: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Briefcase: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            LogOut: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Upload: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            SortAsc: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>,
            SortDesc: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></svg>,
            History: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            UserMinus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/></svg>,
            Megaphone: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 11l8-5v12l-8-5H3v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>,
            FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Alert: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        };

        // --- Error Boundary ---
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return <div className="p-10 text-center"><h2 className="text-red-600 font-bold">오류가 발생했습니다</h2><p className="text-sm">{this.state.error?.message}</p><button onClick={()=>window.location.reload()} className="bg-slate-800 text-white px-4 py-2 rounded mt-4">새로고침</button></div>;
                }
                return this.props.children;
            }
        }

        // --- Components ---
        const Login = ({ onLogin }) => {
            const [id, setId] = useState('');
            const [pw, setPw] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            
            const handleLogin = async (e) => {
                e.preventDefault(); setError(''); setLoading(true);
                // [수정됨] 로그인 이메일 rcsd로 변경
                let email = id === 'rcsd' ? 'rcsd@jangaein.com' : (id.includes('@') ? id : `${id}@jangaein.com`);
                try {
                    await auth.signInWithEmailAndPassword(email, pw);
                    const userDoc = await db.collection('users').doc(email).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        onLogin(userData.role === 'admin' ? { ...userData, role: 'admin', name: '관리자', email } : { ...userData, email });
                    } else onLogin({ role: 'staff', name: id, email });
                } catch (err) { setError('로그인 실패: 아이디 또는 비밀번호를 확인해주세요.'); } finally { setLoading(false); }
            };

            return (
                <div className="flex h-screen items-center justify-center bg-slate-100">
                    <div className="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">
                        <div className="text-center mb-8">
                            <img src="./logo.jpg" alt="장애인사회연구소 로고" className="mx-auto h-16 object-contain mb-4" />
                            <p className="text-slate-500 font-bold">연차 관리 시스템 (회계연도 기준)</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div><label className="block text-sm font-bold text-slate-700 mb-2">아이디</label><input type="text" value={id} onChange={(e)=>setId(e.target.value)} className="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none" required placeholder="rcsd" /></div>
                            <div><label className="block text-sm font-bold text-slate-700 mb-2">비밀번호</label><input type="password" value={pw} onChange={(e)=>setPw(e.target.value)} className="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none" required /></div>
                            {error && <p className="text-red-500 text-xs text-center font-bold animate-pulse">{error}</p>}
                            <button type="submit" disabled={loading} className="w-full bg-cyan-600 text-white font-bold py-4 rounded-xl hover:bg-cyan-700 transition disabled:opacity-50">{loading ? '로그인...' : '로그인 하기'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        // [추가됨] 시스템 업데이트 안내 팝업 컴포넌트
        const UpdateNoticeModal = ({ onClose }) => {
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] animate-fade-in backdrop-blur-sm">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icons.X /></button>
                        <div className="flex items-center gap-3 mb-5">
                            <div className="p-2 bg-cyan-100 text-cyan-600 rounded-lg"><Icons.Megaphone /></div>
                            <h3 className="text-xl font-black text-slate-800">시스템 업데이트 안내</h3>
                        </div>
                        <div className="bg-slate-50 p-5 rounded-xl mb-6 space-y-4 text-sm text-slate-700 border border-slate-100">
                            <p className="font-black text-cyan-700 pb-2 border-b border-cyan-100">Ver 9.3 주요 반영 내역</p>
                            <ul className="list-disc pl-4 space-y-2 font-medium">
                                <li><strong>접속 계정 변경:</strong> 공용 관리자 아이디가 <span className="bg-cyan-100 text-cyan-800 px-1.5 py-0.5 rounded font-bold">rcsd</span> 로 변경되었습니다.</li>
                                <li><strong>회계연도 기준 적용:</strong> 모든 직원의 연차가 입사일 무관하게 <span className="text-red-500 font-bold">매년 1월 1일 ~ 12월 31일</span> 기준으로 부여 및 소멸되도록 자동 산정 방식이 변경되었습니다.</li>
                                <li><strong>맞춤형 UI/UX:</strong> 사단법인 장애인사회연구소 전용 로고 및 테마 색상(Cyan)이 시스템 전체에 일괄 적용되었습니다.</li>
                                <li><strong>연차 촉진 자동화:</strong> 장사연 규정에 맞춘 촉진 알림(10월, 7월, 11월) 및 싸인오케이 양식이 탑재되었습니다.</li>
                            </ul>
                        </div>
                        <button onClick={onClose} className="w-full bg-cyan-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-cyan-700 transition shadow-lg shadow-cyan-200">확인했습니다 (닫기)</button>
                    </div>
                </div>
            );
        };

        const StaffDetailModal = ({ staff, onClose }) => {
            if (!staff) return null;
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 animate-fade-in backdrop-blur-sm">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icons.X /></button>
                        <div className="text-center mb-6">
                            <div className="w-20 h-20 bg-cyan-50 rounded-full mx-auto flex items-center justify-center mb-3"><span className="text-3xl font-black text-cyan-600">{(staff.name || '?')[0]}</span></div>
                            <h3 className="text-2xl font-bold text-slate-800">{staff.name}</h3><p className="text-sm text-slate-500 font-medium">{staff.resignDate ? '퇴사자 정보' : '상세 정보'}</p>
                        </div>
                        <div className="space-y-4">
                            <div className="flex justify-between p-3 bg-slate-50 rounded-xl"><span className="text-xs font-bold text-slate-500">생년월일</span><span className="text-sm font-bold text-slate-800">{staff.birth || '-'}</span></div>
                            <div className="flex justify-between p-3 bg-slate-50 rounded-xl"><span className="text-xs font-bold text-slate-500">휴대폰</span><span className="text-sm font-bold text-slate-800">{staff.phone || '-'}</span></div>
                            <div className="flex justify-between p-3 bg-slate-50 rounded-xl"><span className="text-xs font-bold text-slate-500">입사일</span><span className="text-sm font-bold text-slate-800">{staff.joinDate || '-'}</span></div>
                            <div className="flex justify-between p-3 bg-slate-50 rounded-xl"><span className="text-xs font-bold text-slate-500">근무시간</span><span className="text-sm font-bold text-cyan-600">{staff.workHours || 8}시간</span></div>
                            {staff.resignDate && <div className="flex justify-between p-3 bg-red-50 rounded-xl border border-red-100"><span className="text-xs font-bold text-red-500">퇴사일</span><span className="text-sm font-bold text-red-600">{staff.resignDate}</span></div>}
                        </div>
                        <button onClick={onClose} className="w-full mt-6 bg-slate-800 text-white py-3 rounded-xl text-sm font-bold hover:bg-slate-700 transition">닫기</button>
                    </div>
                </div>
            );
        };

        const PromotionTab = ({ staffList }) => {
            const promotionList = useMemo(() => {
                const list = [];
                staffList.forEach(staff => {
                    const status = getPromotionStatus(staff);
                    if (status) {
                        const leaveInfo = calculateAnnualLeave(staff.joinDate);
                        const dailyHours = safeParseFloat(staff.workHours) || 8;
                        const totalDays = leaveInfo.total || 0;
                        const totalHours = totalDays * dailyHours;
                        const usedHours = staff.annualLeaveUsed || 0;
                        const remainingHours = totalHours - usedHours;
                        const usedDays = dailyHours > 0 ? Math.round((usedHours / dailyHours) * 10) / 10 : 0;
                        const remainingDays = dailyHours > 0 ? Math.round((remainingHours / dailyHours) * 10) / 10 : 0;
                        list.push({ ...staff, promoStatus: status, leaveInfo, totalDays, usedDays, remainingDays });
                    }
                });
                return list;
            }, [staffList]);

            const handleDownloadSignOK = () => {
                const targets = promotionList.filter(p => p.promoStatus.type.includes('1차'));
                if (targets.length === 0) { alert("이번 달 1차 촉진 대상자가 없습니다."); return; }
                const today = new Date();
                const year = today.getFullYear();
                const month = today.getMonth() + 1;
                const day = today.getDate();
                const excelData = targets.map(p => ({
                    "이메일 또는 휴대폰번호(필수)": p.phone || "", "이름(필수)": p.name || "", "남길말(선택)": "",
                    "연차 사용대상기간(장사연)": p.leaveInfo.period || "", "발생연차(장사연)": p.totalDays || 0,
                    "사용연차(장사연)": p.usedDays, "미사용(장사연)": p.remainingDays,
                    "연차유급휴가 발생일(장사연)": p.leaveInfo.startDate, "성명(장사연)": p.name || "",
                    "소속(장사연)": "", "직위(장사연)": "",
                    "연도(장사연)-1": year, "월(장사연)-1": month, "일(장사연)-1": day,
                    "연도(장사연)": year, "월(장사연)": month, "일(장사연)": 20
                }));
                const ws = XLSX.utils.json_to_sheet(excelData); const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "싸인오케이_대량발송");
                XLSX.writeFile(wb, `1차촉진_통보대상_${year}_${month}.xlsx`);
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div><h3 className="font-bold text-lg text-slate-800 mb-2 flex items-center gap-2"><Icons.Megaphone /> 이번 달 연차 촉진 대상자</h3><p className="text-sm text-slate-500">근로기준법 기준 (1년 미만: 3개월 전 / 1년 이상: 6개월 전)</p></div>
                        <button onClick={handleDownloadSignOK} className="bg-cyan-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-cyan-700 transition"><Icons.FileText /> 싸인오케이 양식 다운로드 (1차)</button>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <table className="w-full text-sm text-left"><thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-100"><tr><th className="p-4">이름</th><th className="p-4">입사일</th><th className="p-4">연차 산정 기간</th><th className="p-4 text-center">촉진 단계</th><th className="p-4">조치 사항</th></tr></thead><tbody className="divide-y divide-slate-100">{promotionList.map((staff) => (<tr key={staff.id} className="hover:bg-slate-50"><td className="p-4 font-bold text-slate-800">{staff.name}</td><td className="p-4 text-slate-500">{staff.joinDate}</td><td className="p-4 text-xs text-slate-400">{staff.leaveInfo.period}</td><td className="p-4 text-center"><span className={`px-3 py-1 rounded-full text-xs font-bold ${staff.promoStatus.color}`}>{staff.promoStatus.type}</span></td><td className="p-4 font-bold text-slate-600">{staff.promoStatus.msg}</td></tr>))}{promotionList.length === 0 && <tr><td colSpan="5" className="p-12 text-center text-slate-400">대상자 없음</td></tr>}</tbody></table>
                    </div>
                </div>
            );
        };

        const LeaveActionModal = ({ onClose, staffList, initialData = null }) => {
            const isEdit = !!initialData; 
            const [selectedStaffId, setSelectedStaffId] = useState(initialData?.staffId || '');
            const [leaveDate, setLeaveDate] = useState(initialData?.date || toLocalYMD(new Date()));
            const [inputType, setInputType] = useState('day');
            const [leaveDayType, setLeaveDayType] = useState('1'); 
            const [leaveHourValue, setLeaveHourValue] = useState(''); 
            const [reason, setReason] = useState(initialData?.reason || '');
            const [msg, setMsg] = useState('');

            useEffect(() => {
                if (initialData) {
                    const days = safeParseFloat(initialData.days);
                    if (days === 1 || days === 0.5) { setInputType('day'); setLeaveDayType(String(days)); }
                    else { setInputType('hour'); setLeaveHourValue(String(days)); }
                }
            }, [initialData]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!selectedStaffId) { setMsg('❌ 직원을 선택해주세요.'); return; }
                const staff = staffList.find(s => s.id === selectedStaffId);
                const dailyHours = safeParseFloat(staff.workHours) || 8; 
                let deductHours = 0;

                if (inputType === 'day') {
                    deductHours = (leaveDayType === '1') ? dailyHours : dailyHours / 2;
                } else {
                    deductHours = safeParseFloat(leaveHourValue);
                    if (deductHours <= 0) { setMsg('❌ 시간을 입력하세요.'); return; }
                }

                setMsg('처리 중...');
                try {
                    let newHistory = [...(staff.leaveHistory || [])];
                    const typeText = inputType === 'day' ? (leaveDayType === '1' ? '연차' : '반차') : `${deductHours}시간`;
                    
                    if (isEdit) {
                        const targetIdx = newHistory.findIndex(h => h.id === initialData.id);
                        if (targetIdx !== -1) {
                            newHistory[targetIdx] = { ...newHistory[targetIdx], date: safeDate(leaveDate), days: deductHours, type: typeText, reason };
                        }
                    } else {
                        newHistory.push({
                            id: Date.now().toString() + Math.floor(Math.random() * 1000), 
                            date: safeDate(leaveDate), 
                            days: deductHours, 
                            type: typeText, 
                            reason, 
                            createdAt: new Date().toISOString()
                        });
                    }

                    const currentInfo = calculateAnnualLeave(staff.joinDate);
                    const totalUsedHours = newHistory.reduce((acc, curr) => {
                        if (curr.date >= currentInfo.startDate && curr.date <= currentInfo.endDate) return acc + (safeParseFloat(curr.days) || 0);
                        return acc;
                    }, 0);

                    await db.collection('users').doc(selectedStaffId).update({ annualLeaveUsed: totalUsedHours, leaveHistory: newHistory });
                    setMsg('✅ 완료!'); setTimeout(() => { setMsg(''); onClose(); }, 1000);
                } catch (err) { setMsg('❌ 오류: ' + err.message); }
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 animate-fade-in backdrop-blur-sm">
                    <div className="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icons.X /></button>
                        <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2 text-lg">{isEdit ? '연차 수정' : '연차 등록'}</h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">직원</label><select className="w-full border rounded-xl p-3 text-sm bg-white outline-none" value={selectedStaffId} onChange={(e) => setSelectedStaffId(e.target.value)} disabled={isEdit} required><option value="">선택...</option>{staffList.sort((a,b) => a.name.localeCompare(b.name)).map(s => (<option key={s.id} value={s.id}>{s.name} (일 {s.workHours || 8}h)</option>))}</select></div>
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">날짜</label><input type="date" value={leaveDate} onChange={e => setLeaveDate(e.target.value)} className="w-full border rounded-xl p-3 text-sm outline-none" required /></div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1">등록 단위</label>
                                <div className="flex gap-2 mb-2">
                                    <label className="flex-1 border rounded-xl p-2 text-sm text-center cursor-pointer"><input type="radio" name="itype" value="day" checked={inputType === 'day'} onChange={() => setInputType('day')} className="hidden"/>일 단위</label>
                                    <label className="flex-1 border rounded-xl p-2 text-sm text-center cursor-pointer"><input type="radio" name="itype" value="hour" checked={inputType === 'hour'} onChange={() => setInputType('hour')} className="hidden"/>시간 단위</label>
                                </div>
                                {inputType === 'day' ? (
                                    <div className="flex gap-2">
                                        <label className="flex-1 border rounded-xl p-3 text-sm text-center cursor-pointer"><input type="radio" name="dtype" value="1" checked={leaveDayType === '1'} onChange={() => setLeaveDayType('1')} className="hidden"/>연차 (1일)</label>
                                        <label className="flex-1 border rounded-xl p-3 text-sm text-center cursor-pointer"><input type="radio" name="dtype" value="0.5" checked={leaveDayType === '0.5'} onChange={() => setLeaveDayType('0.5')} className="hidden"/>반차 (0.5일)</label>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2"><input type="number" value={leaveHourValue} onChange={e => setLeaveHourValue(e.target.value)} className="w-full border rounded-xl p-3 text-sm outline-none font-bold text-center" placeholder="시간" min="0.1" step="0.1" /><span className="text-sm font-bold text-slate-600">시간</span></div>
                                )}
                            </div>
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">사유</label><input type="text" value={reason} onChange={e => setReason(e.target.value)} className="w-full border rounded-xl p-3 text-sm outline-none" placeholder="사유 입력" /></div>
                            <button type="submit" className="w-full bg-cyan-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-cyan-700 transition">{isEdit ? '수정' : '등록'}</button>
                            {msg && <p className="text-xs text-center font-bold text-cyan-600">{msg}</p>}
                        </form>
                    </div>
                </div>
            );
        };

        const LeaveManagementTab = ({ staffList, onOpenModal, onEditClick, isPastMode = false, isResignedTab = false, onNameClick }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear() - 1); 
            const [showNegativeOnly, setShowNegativeOnly] = useState(false); 
            const [showCheckOnly, setShowCheckOnly] = useState(false);
            const fileInputRef = useRef(null);

            const filteredList = useMemo(() => {
                let data = staffList.map(staff => {
                    const dailyHours = safeParseFloat(staff.workHours) || 8;
                    let leaveInfo, usedHours = 0, activeHistory = [];

                    if (isPastMode) {
                        leaveInfo = calculateLeaveForYear(staff.joinDate, selectedYear);
                    } else {
                        leaveInfo = calculateAnnualLeave(staff.joinDate);
                    }

                    const allHistory = (staff.leaveHistory || []).sort((a,b) => new Date(b.date) - new Date(a.date));
                    
                    if (isPastMode) {
                        activeHistory = allHistory.filter(h => h.date >= leaveInfo.startDate && h.date <= leaveInfo.endDate);
                    } else {
                        activeHistory = allHistory.filter(h => h.date >= leaveInfo.startDate && h.date <= leaveInfo.endDate);
                    }

                    usedHours = activeHistory.reduce((acc, cur) => acc + (safeParseFloat(cur.days) || 0), 0);

                    const totalDays = leaveInfo.total || 0;
                    const totalHours = totalDays * dailyHours;
                    const remainingHours = totalHours - usedHours;
                    const usedDays = dailyHours > 0 ? Math.round((usedHours / dailyHours) * 10) / 10 : 0;
                    const remainingDays = dailyHours > 0 ? Math.round((remainingHours / dailyHours) * 10) / 10 : 0;
                    
                    const joinDateObj = new Date(staff.joinDate);
                    const joinMonth = joinDateObj.getMonth() + 1;
                    const needsCheck = activeHistory.some(h => {
                        const hMonth = new Date(h.date).getMonth() + 1;
                        return hMonth === joinMonth;
                    });

                    const displayHistory = activeHistory.map(h => ({
                        ...h,
                        isWarn: (new Date(h.date).getMonth() + 1) === joinMonth
                    }));

                    return { ...staff, dailyHours, leaveInfo, totalDays, totalHours, usedHours, remainingHours, usedDays, remainingDays, displayHistory, notJoined: leaveInfo.notJoined, resignDate: staff.resignDate, needsCheck };
                });

                return data.filter(d => {
                    if (!isResignedTab && d.notJoined) return false;
                    const matchName = d.name && d.name.includes(searchTerm);
                    const matchNegative = showNegativeOnly ? d.remainingHours < 0 : true;
                    const matchCheck = showCheckOnly ? d.needsCheck : true;
                    return matchName && matchNegative && matchCheck;
                });
            }, [staffList, selectedYear, isPastMode, searchTerm, showNegativeOnly, showCheckOnly, isResignedTab]);

            const handleDeleteLeave = async (data, leaveId) => {
                if (!window.confirm('삭제하시겠습니까?')) return;
                try {
                    const newHistory = (data.leaveHistory || []).filter(h => h.id !== leaveId);
                    const currentInfo = calculateAnnualLeave(data.joinDate);
                    const totalUsedHours = newHistory.reduce((acc, curr) => {
                        if (curr.date >= currentInfo.startDate && curr.date <= currentInfo.endDate) return acc + (safeParseFloat(curr.days) || 0);
                        return acc;
                    }, 0);
                    await db.collection('users').doc(data.id).update({ annualLeaveUsed: totalUsedHours, leaveHistory: newHistory });
                    alert('삭제되었습니다.');
                } catch (err) { alert('오류: ' + err.message); }
            };

            const handleLeaveFileUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                const processFile = (file) => {
                    return new Promise((resolve, reject) => {
                        const match = file.name.match(/(\d{4})[\.\-](\d{1,2})/);
                        if (!match) { resolve(null); return; } 
                        const year = match[1]; const month = match[2].padStart(2, '0');
                        const uploadDate = `${year}-${month}-01`; const uploadType = `${year}.${month} 일괄등록`;
                        const reader = new FileReader();
                        reader.readAsArrayBuffer(file);
                        reader.onload = (evt) => {
                            try {
                                const data = new Uint8Array(evt.target.result);
                                const wb = XLSX.read(data, { type: 'array' });
                                const ws = wb.Sheets[wb.SheetNames[0]];
                                const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                                resolve({ jsonData, uploadDate, uploadType });
                            } catch (err) { reject(err); }
                        };
                        reader.onerror = reject;
                    });
                };

                Promise.all(files.map(processFile)).then(async (results) => {
                    const batch = db.batch();
                    const updates = {};
                    let updateCount = 0;

                    results.forEach(res => {
                        if (!res) return;
                        const { jsonData, uploadDate, uploadType } = res;
                        for (let i = 2; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0) continue;
                            const name = row[1]; const birthRaw = row[2]; const leaveHours = safeParseFloat(row[5]);
                            if (name) {
                                const normName = normalizeString(name);
                                const parsedBirth = birthRaw ? safeDate(birthRaw) : '';
                                const normBirth = normalizeString(parsedBirth);
                                
                                let targetStaff = staffList.find(s => normalizeString(s.name) === normName && normalizeString(s.birth) === normBirth);
                                if (!targetStaff) {
                                    const matchingNames = staffList.filter(s => normalizeString(s.name) === normName);
                                    if (matchingNames.length === 1) targetStaff = matchingNames[0];
                                }

                                if (targetStaff && leaveHours >= 0) {
                                    if (!updates[targetStaff.id]) { updates[targetStaff.id] = { newHistory: [...(targetStaff.leaveHistory || [])], staff: targetStaff }; }
                                    const history = updates[targetStaff.id].newHistory;
                                    const existingIdx = history.findIndex(h => h.date === uploadDate && h.type === uploadType);
                                    if (existingIdx !== -1) { history[existingIdx] = { ...history[existingIdx], days: leaveHours }; } 
                                    else if (leaveHours > 0) { history.push({ id: Date.now().toString() + Math.random(), date: uploadDate, days: leaveHours, type: uploadType, reason: '엑셀 일괄', createdAt: new Date().toISOString() }); }
                                    updateCount++;
                                }
                            }
                        }
                    });

                    Object.keys(updates).forEach(uid => {
                        const { newHistory, staff } = updates[uid];
                        const currentInfo = calculateAnnualLeave(staff.joinDate);
                        const totalUsedHours = newHistory.reduce((acc, curr) => {
                            if (curr.date >= currentInfo.startDate && curr.date <= currentInfo.endDate) return acc + (safeParseFloat(curr.days) || 0);
                            return acc;
                        }, 0);
                        const ref = db.collection('users').doc(uid);
                        batch.update(ref, { annualLeaveUsed: totalUsedHours, leaveHistory: newHistory });
                    });
                    await batch.commit();
                    alert(`✅ 총 ${updateCount}건 처리 완료!`);
                }).catch(err => alert("오류: " + err.message));
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div><h3 className="font-bold text-lg text-slate-800">{isPastMode ? '과년도' : '연차 관리'}</h3><p className="text-xs text-slate-500">시간 단위(Hour) 관리</p></div>
                            {isPastMode && (<select value={selectedYear} onChange={(e) => setSelectedYear(parseInt(e.target.value))} className="bg-white border rounded-lg px-3 py-1.5 outline-none">{[...Array(5)].map((_, i) => { const y = new Date().getFullYear() - i; return <option key={y} value={y}>{y}년</option> })}</select>)}
                        </div>
                        <div className="flex items-center gap-3">
                            <label className="flex items-center gap-2 cursor-pointer bg-orange-50 px-3 py-2 rounded-xl border border-orange-100 hover:bg-orange-100 transition"><input type="checkbox" checked={showCheckOnly} onChange={(e) => setShowCheckOnly(e.target.checked)} /><span className="text-sm font-bold text-orange-600 flex items-center gap-1"><Icons.Alert /> 갱신월 중복 확인</span></label>
                            <label className="flex items-center gap-2 cursor-pointer bg-slate-50 px-3 py-2 rounded-xl border hover:bg-slate-100 transition"><input type="checkbox" checked={showNegativeOnly} onChange={(e) => setShowNegativeOnly(e.target.checked)} /><span className="text-sm font-bold text-red-500">초과자만 보기</span></label>
                            <input type="text" placeholder="이름 검색..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="pl-4 pr-4 py-2 border rounded-xl text-sm outline-none w-32" />
                            <input type="file" ref={fileInputRef} onChange={handleLeaveFileUpload} accept=".xlsx, .xls" multiple className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="bg-cyan-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-cyan-700 transition"><Icons.Upload /> 일괄</button>
                            <button onClick={() => onOpenModal()} className="bg-cyan-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-cyan-700 transition"><Icons.Plus /> 등록</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-100">
                                <tr>
                                    <th className="p-4">이름</th><th className="p-4 text-center text-cyan-600">총 연차</th><th className="p-4 text-center text-red-500">사용</th><th className="p-4 text-center text-green-600">잔여</th><th className="p-4 w-44">기간</th><th className="p-4">내역</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredList.map((data) => {
                                    return (
                                        <tr key={data.id} className="hover:bg-slate-50 transition">
                                            <td className="p-4">
                                                <div 
                                                    className="font-bold text-slate-800 cursor-pointer hover:underline hover:text-cyan-600"
                                                    onClick={() => onNameClick && onNameClick(data)}
                                                >
                                                    {data.name}
                                                </div>
                                                {data.workHours && <div className="text-xs text-slate-500">일 {data.workHours}h</div>}
                                                {data.needsCheck && <div className="text-xs text-orange-600 font-bold mt-1 flex items-center gap-1 animate-pulse"><Icons.Alert /> 날짜 확인 필요</div>}
                                            </td>
                                            <td className="p-4 text-center font-bold text-cyan-600">{fmt(data.totalHours)}h <span className="text-xs font-normal text-slate-400">({data.totalDays}일)</span></td>
                                            <td className="p-4 text-center font-bold text-red-500">{fmt(data.usedHours)}h <span className="text-xs font-normal text-slate-400">({data.usedDays}일)</span></td>
                                            <td className={`p-4 text-center font-black text-lg ${data.remainingHours < 0 ? 'text-red-600 animate-pulse' : 'text-green-600'}`}>{fmt(data.remainingHours)}h <span className="text-xs font-normal text-slate-400">({data.remainingDays}일)</span></td>
                                            <td className="p-4 text-xs text-slate-400">{data.leaveInfo.period}</td>
                                            <td className="p-4">{data.displayHistory.length > 0 ? (
                                                <div className="max-h-32 overflow-y-auto space-y-1 scrollbar-thin">
                                                    {data.displayHistory.map((rec, i) => (
                                                        <div key={rec.id || i} className={`flex items-center justify-between text-xs p-2 rounded-lg border group hover:border-cyan-200 ${rec.isWarn ? 'bg-orange-50 border-orange-200' : 'bg-slate-50'}`}>
                                                            <div className="flex items-center gap-2">
                                                                <span className="font-bold">{rec.date}</span>
                                                                <span className={`px-1.5 rounded text-[10px] font-bold ${rec.days >= data.dailyHours ? 'bg-cyan-100 text-cyan-600' : 'bg-orange-100 text-orange-600'}`}>{fmt(rec.days)}h ({rec.type})</span>
                                                                {rec.isWarn && <span className="text-orange-500"><Icons.Alert /></span>}
                                                            </div>
                                                            <div className="flex gap-1 opacity-0 group-hover:opacity-100"><button onClick={() => onEditClick(data.id, 0, rec)} className="text-cyan-500"><Icons.Edit /></button><button onClick={() => handleDeleteLeave(data, rec.id)} className="text-red-500"><Icons.Trash /></button></div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : <span className="text-slate-300 text-xs">-</span>}</td>
                                        </tr>
                                    );
                                })}
                                {filteredList.length === 0 && <tr><td colSpan="6" className="p-12 text-center text-slate-400">데이터가 없습니다.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StaffTab = ({ staffList }) => {
            const fileInputRef = useRef(null);
            const [uploadMsg, setUploadMsg] = useState('');
            const [editingStaff, setEditingStaff] = useState(null);
            const [viewingStaff, setViewingStaff] = useState(null);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });
            
            const activeStaffList = useMemo(() => staffList.filter(s => s.status !== 'resigned'), [staffList]);

            const processedStaffList = useMemo(() => {
                let data = [...activeStaffList];
                if (searchTerm) {
                    const lowerTerm = searchTerm.toLowerCase();
                    data = data.filter(s => (s.name && s.name.toLowerCase().includes(lowerTerm)) || (s.phone && s.phone.includes(lowerTerm)));
                }
                
                data = data.map(staff => {
                    const leaveInfo = calculateAnnualLeave(staff.joinDate);
                    const dailyHours = safeParseFloat(staff.workHours) || 8;
                    const totalDays = leaveInfo.total || 0;
                    const totalHours = totalDays * dailyHours;
                    const usedHours = staff.annualLeaveUsed || 0;
                    const remainingHours = totalHours - usedHours;
                    const remainingDays = dailyHours > 0 ? Math.round((remainingHours / dailyHours) * 10) / 10 : 0;
                    const usedDays = dailyHours > 0 ? Math.round((usedHours / dailyHours) * 10) / 10 : 0;
                    
                    return { ...staff, dailyHours, totalDays, totalHours, usedHours, remainingHours, remainingDays, usedDays, leaveInfo };
                });

                if (sortConfig.key) {
                    data.sort((a, b) => {
                        let aVal = a[sortConfig.key];
                        let bVal = b[sortConfig.key];
                        if (sortConfig.key === 'remaining') { aVal = a.remainingHours; bVal = b.remainingHours; }
                        if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return data;
            }, [activeStaffList, searchTerm, sortConfig]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };
            const getSortIcon = (key) => {
                if (sortConfig.key !== key) return <span className="text-slate-300 ml-1">⇅</span>;
                return sortConfig.direction === 'asc' ? <span className="text-cyan-600 ml-1"><Icons.SortAsc /></span> : <span className="text-cyan-600 ml-1"><Icons.SortDesc /></span>;
            };
            
            const handleFileUpload = (e, isResignedUpload = false) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = async (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const wb = XLSX.read(data, { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        if (jsonData.length < 2) { setUploadMsg('❌ 데이터 없음'); return; }
                        const batch = db.batch();
                        let count = 0;
                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0) continue;
                            const name = row[0]; 
                            if (name) {
                                const birthRaw = row[1]; const phoneRaw = row[2]; const joinRaw = row[3]; const workRaw = row[4];
                                const joinDate = safeDate(joinRaw); const birthDate = safeDate(birthRaw);
                                const leaveInfo = calculateAnnualLeave(joinDate);
                                const phoneStr = String(phoneRaw || '').trim();
                                const uniqueKey = `${name}_${phoneStr.slice(-4)}`;
                                const email = `${uniqueKey}@jangaein.com`;
                                const docRef = db.collection('users').doc(email);
                                batch.set(docRef, {
                                    name, birth: birthDate, phone: phoneRaw || '', workHours: workRaw || '', 
                                    joinDate, employeeId: uniqueKey, role: 'staff', tempPw: '123456', 
                                    annualLeaveTotal: leaveInfo.total || 0, annualLeavePeriod: leaveInfo.period || '-',
                                    status: isResignedUpload ? 'resigned' : 'active', resignDate: isResignedUpload ? (resignDate || '') : ''
                                }, { merge: true });
                                count++;
                            }
                        }
                        await batch.commit();
                        setUploadMsg(`✅ ${count}명 처리 완료!`);
                        setTimeout(() => setUploadMsg(''), 3000);
                    } catch (err) { setUploadMsg('❌ 오류: ' + err.message); }
                };
            };

            const handleDeleteOne = async (staff) => {
                if (window.confirm(`정말 [${staff.name}] 직원을 삭제하시겠습니까?`)) {
                    try { await db.collection('users').doc(staff.id).delete(); alert('삭제되었습니다.'); } catch (err) { alert('삭제 실패: ' + err.message); }
                }
            };
            const handleSelectAll = (e) => {
                if (e.target.checked) { const allIds = new Set(processedStaffList.map(s => s.id)); setSelectedIds(allIds); } else setSelectedIds(new Set());
            };
            const handleSelectOne = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
                setSelectedIds(newSet);
            };
            const handleBulkDelete = async () => {
                if (selectedIds.size === 0) return;
                if (!window.confirm(`선택한 ${selectedIds.size}명을 삭제하시겠습니까?`)) return;
                try {
                    const batch = db.batch();
                    selectedIds.forEach(id => { batch.delete(db.collection('users').doc(id)); });
                    await batch.commit();
                    alert(`${selectedIds.size}명 삭제 완료`);
                    setSelectedIds(new Set());
                } catch (err) { alert('오류: ' + err.message); }
            };

            return (
                <div className="space-y-6">
                    {editingStaff && <EditStaffModal staff={editingStaff} onClose={() => setEditingStaff(null)} />}
                    {viewingStaff && <StaffDetailModal staff={viewingStaff} onClose={() => setViewingStaff(null)} />}
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-4 flex-1">
                            <div><h3 className="font-bold text-lg text-slate-800">직원 명부 관리</h3><p className="text-xs text-slate-500">총 {processedStaffList.length}명 (퇴사자 제외)</p></div>
                            <div className="relative group"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-cyan-500"><Icons.Search /></div><input type="text" placeholder="이름 검색..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-cyan-500 outline-none w-64 transition" /></div>
                        </div>
                        <div className="flex items-center gap-3">
                            {selectedIds.size > 0 && (<button onClick={handleBulkDelete} className="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600 transition flex items-center gap-2 animate-fade-in shadow-lg shadow-red-200"><Icons.Trash /> 선택 삭제 ({selectedIds.size})</button>)}
                            {uploadMsg && <span className="text-sm font-bold text-cyan-600 animate-pulse">{uploadMsg}</span>}
                            <input type="file" ref={fileInputRef} onChange={(e) => handleFileUpload(e, false)} accept=".xlsx, .xls, .csv" className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="bg-cyan-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-cyan-700 transition flex items-center gap-2"><Icons.Upload /> 엑셀 업로드</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-100">
                                <tr>
                                    <th className="p-4 w-12 text-center"><input type="checkbox" checked={processedStaffList.length > 0 && selectedIds.size === processedStaffList.length} onChange={handleSelectAll} /></th>
                                    <th className="p-4 sortable" onClick={() => handleSort('name')}><div className="flex items-center">이름 (상세보기) {getSortIcon('name')}</div></th>
                                    <th className="p-4 text-center text-cyan-600">발생(시간)</th>
                                    <th className="p-4 text-center text-red-500">사용(시간)</th>
                                    <th className="p-4 text-center text-green-600 sortable" onClick={() => handleSort('remaining')}><div className="flex items-center justify-center">잔여(시간) {getSortIcon('remaining')}</div></th>
                                    <th className="p-4 text-center w-24 bg-slate-100">관리</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {processedStaffList.map((staff, idx) => {
                                    return (
                                        <tr key={idx} className={`hover:bg-slate-50 transition ${selectedIds.has(staff.id) ? 'bg-cyan-50/50' : ''}`}>
                                            <td className="p-4 text-center"><input type="checkbox" checked={selectedIds.has(staff.id)} onChange={() => handleSelectOne(staff.id)} /></td>
                                            <td className="p-4 font-bold text-cyan-600 cursor-pointer hover:underline" onClick={() => setViewingStaff(staff)}>
                                                {staff.name} <span className="text-slate-400 text-xs font-normal ml-1">click</span>
                                            </td>
                                            <td className="p-4 text-center font-bold text-cyan-600">{fmt(staff.totalHours)}h <span className="text-xs font-normal text-slate-400">({staff.totalDays}일)</span></td>
                                            <td className="p-4 text-center text-slate-400">{fmt(staff.usedHours)}h <span className="text-xs font-normal text-slate-400">({staff.usedDays}일)</span></td>
                                            <td className="p-4 text-center font-bold text-green-600">{fmt(staff.remainingHours)}h <span className="text-xs font-normal text-slate-400">({staff.remainingDays}일)</span></td>
                                            <td className="p-4 text-center bg-slate-50/50"><div className="flex justify-center gap-2"><button onClick={() => setEditingStaff(staff)} className="p-1.5 text-cyan-500 hover:bg-cyan-100 rounded-lg transition"><Icons.Edit /></button><button onClick={() => handleDeleteOne(staff)} className="p-1.5 text-red-400 hover:bg-red-100 rounded-lg transition"><Icons.Trash /></button></div></td>
                                        </tr>
                                    );
                                })}
                                {processedStaffList.length === 0 && (<tr><td colSpan="6" className="p-12 text-center text-slate-400">데이터가 없습니다.</td></tr>)}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ResignedStaffTab = ({ staffList, onOpenModal, onEditClick, onNameClick }) => {
            const [isPastMode, setIsPastMode] = useState(false);
            const resignedFileInputRef = useRef(null);
            
            const resignedList = useMemo(() => staffList.filter(s => s.status === 'resigned' || (s.resignDate && s.resignDate.trim().length > 0)), [staffList]);

            const handleResignedStaffUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = async (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const wb = XLSX.read(data, { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        const batch = db.batch();
                        let count = 0;
                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0) continue;
                            const name = row[0];
                            if (name) {
                                const birthRaw = row[1]; const phoneRaw = row[2]; const joinRaw = row[3]; const workRaw = row[4]; const resignRaw = row[5];
                                const joinDate = safeDate(joinRaw); const birthDate = safeDate(birthRaw); const resignDate = safeDate(resignRaw);
                                const leaveInfo = calculateAnnualLeave(joinDate);
                                const email = `${name}_${String(phoneRaw||'').trim().slice(-4)}@jangaein.com`;
                                const docRef = db.collection('users').doc(email);
                                batch.set(docRef, {
                                    name, birth: birthDate, phone: phoneRaw || '', workHours: workRaw || '', 
                                    joinDate, role: 'staff', tempPw: '123456', 
                                    annualLeaveTotal: leaveInfo.total || 0, annualLeavePeriod: leaveInfo.period || '-',
                                    status: 'resigned', resignDate: resignDate || ''
                                }, { merge: true });
                                count++;
                            }
                        }
                        await batch.commit();
                        alert(`✅ 퇴사자 ${count}명 명부 등록 완료!`);
                    } catch (err) { alert('오류: ' + err.message); }
                };
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center bg-orange-50 p-4 rounded-xl border border-orange-100">
                        <div className="flex items-center gap-2 font-bold text-orange-800"><Icons.UserMinus /> 퇴사자 관리 모드</div>
                        <div className="flex items-center gap-3">
                            <label className="flex items-center gap-2 cursor-pointer bg-white px-3 py-2 rounded-lg border border-orange-200 hover:bg-orange-100 transition"><input type="checkbox" checked={isPastMode} onChange={(e) => setIsPastMode(e.target.checked)} /><span className="text-sm font-bold text-orange-700">과년도 기록 보기</span></label>
                            <input type="file" ref={resignedFileInputRef} onChange={handleResignedStaffUpload} accept=".xlsx, .xls" className="hidden" />
                            <button onClick={() => resignedFileInputRef.current.click()} className="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-orange-600 transition shadow-lg shadow-orange-200"><Icons.Upload /> 퇴사자 명부 업로드</button>
                        </div>
                    </div>
                    <LeaveManagementTab 
                        staffList={resignedList} 
                        onOpenModal={() => alert("퇴사자는 신규 연차 등록이 불가능합니다.")} 
                        onEditClick={onEditClick} 
                        isPastMode={isPastMode} 
                        isResignedTab={true}
                        onNameClick={onNameClick}
                    />
                </div>
            );
        };

        const EditStaffModal = ({ staff, onClose }) => {
            const [formData, setFormData] = useState({ ...staff });
            const [msg, setMsg] = useState('');
            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleSave = async (e) => {
                e.preventDefault();
                setMsg('저장 중...');
                try {
                    let updates = { ...formData };
                    if (formData.joinDate !== staff.joinDate) {
                        const leaveInfo = calculateAnnualLeave(formData.joinDate);
                        updates.annualLeaveTotal = leaveInfo.total;
                        updates.annualLeavePeriod = leaveInfo.period;
                    }
                    if (formData.resignDate && formData.resignDate.trim() !== "") {
                        updates.status = 'resigned';
                    }
                    
                    await db.collection('users').doc(staff.id).update(updates);
                    setMsg('✅ 수정 완료!'); setTimeout(() => { setMsg(''); onClose(); }, 1000);
                } catch (err) { setMsg('❌ 오류: ' + err.message); }
            };
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 animate-fade-in backdrop-blur-sm">
                    <div className="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icons.X /></button>
                        <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2 text-lg">직원 정보 수정</h3>
                        <form onSubmit={handleSave} className="space-y-4">
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">이름</label><input type="text" name="name" value={formData.name || ''} onChange={handleChange} className="w-full border rounded-xl p-3 text-sm outline-none" required /></div>
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">생년월일</label><input type="text" name="birth" value={formData.birth || ''} onChange={handleChange} className="w-full border rounded-xl p-3 text-sm outline-none" /></div>
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">휴대폰번호</label><input type="text" name="phone" value={formData.phone || ''} onChange={handleChange} className="w-full border rounded-xl p-3 text-sm outline-none" /></div>
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">일일 근무시간</label><input type="text" name="workHours" value={formData.workHours || ''} onChange={handleChange} className="w-full border rounded-xl p-3 text-sm outline-none" /></div>
                            <div><label className="block text-xs font-bold text-slate-500 mb-1">입사일</label><input type="date" name="joinDate" value={formData.joinDate || ''} onChange={handleChange} className="w-full border rounded-xl p-3 text-sm outline-none" required /></div>
                            <div><label className="block text-xs font-bold text-red-500 mb-1">퇴사일 (선택)</label><input type="date" name="resignDate" value={formData.resignDate || ''} onChange={handleChange} className="w-full border border-red-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-red-200" /></div>
                            <button type="submit" className="w-full bg-cyan-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-cyan-700 transition shadow-lg shadow-cyan-200">수정 저장하기</button>
                            {msg && <p className="text-xs text-center font-bold text-cyan-600">{msg}</p>}
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [staffList, setStaffList] = useState([]);
            const [showLeaveModal, setShowLeaveModal] = useState(false);
            const [editingLeaveData, setEditingLeaveData] = useState(null);
            const [viewingStaffDetail, setViewingStaffDetail] = useState(null);
            
            // [추가됨] 업데이트 안내 모달 상태 관리 (로그인 직후 기본 활성화)
            const [showUpdateNotice, setShowUpdateNotice] = useState(true);
            
            useEffect(() => {
                if (user && user.role === 'admin') {
                    const unsub = db.collection('users').onSnapshot((snapshot) => {
                        const list = snapshot.docs.map(d => ({ ...d.data(), id: d.id })).filter(u => u.role === 'staff');
                        setStaffList(list);
                    });
                    return () => unsub();
                }
            }, [user]);

            const handleLogout = async () => { try { await auth.signOut(); } catch(e) {} setUser(null); };
            const handleEditLeave = (staffId, index, data) => { setEditingLeaveData({ ...data, staffId, index }); setShowLeaveModal(true); };
            const closeLeaveModal = () => { setShowLeaveModal(false); setEditingLeaveData(null); };

            if (!user) return <Login onLogin={setUser} />;

            const activeStaffList = staffList.filter(s => s.status !== 'resigned');
            const todayStr = toLocalYMD(new Date());
            const todayLeaveCount = activeStaffList.filter(s => s.leaveHistory?.some(r => r.date === todayStr)).length || 0;
            
            let totalGenCurrentYear = 0;
            let totalUsedCurrentYear = 0;

            activeStaffList.forEach(staff => {
                const leaveInfo = calculateAnnualLeave(staff.joinDate);
                if (leaveInfo.notJoined) return;

                const dailyHours = safeParseFloat(staff.workHours) || 8;
                const totalHours = (leaveInfo.total || 0) * dailyHours;
                
                const currentUsed = (staff.leaveHistory || []).reduce((acc, h) => {
                    if (h.date >= leaveInfo.startDate && h.date <= leaveInfo.endDate) {
                        return acc + (safeParseFloat(h.days) || 0);
                    }
                    return acc;
                }, 0);

                totalGenCurrentYear += totalHours;
                totalUsedCurrentYear += currentUsed;
            });

            const currentYearRate = totalGenCurrentYear > 0 
                ? Math.round((totalUsedCurrentYear / totalGenCurrentYear) * 100) 
                : 0;

            const currentYear = new Date().getFullYear();
            const years = [currentYear - 3, currentYear - 2, currentYear - 1, currentYear];
            
            const yearlyStats = years.map(year => {
                let yGen = 0;
                let yUsed = 0;
                
                staffList.forEach(staff => {
                    const info = calculateLeaveForYear(staff.joinDate, year);
                    if (info.notJoined) return; 

                    const daily = safeParseFloat(staff.workHours) || 8;
                    yGen += (info.total * daily);

                    const used = (staff.leaveHistory || []).reduce((acc, h) => {
                        if (h.date >= info.startDate && h.date <= info.endDate) {
                            return acc + (safeParseFloat(h.days) || 0);
                        }
                        return acc;
                    }, 0);
                    yUsed += used;
                });

                return { year, rate: yGen > 0 ? Math.round((yUsed / yGen) * 100) : 0 };
            });

            const DASHBOARD_STATS = [
                { label: "총 임직원", value: activeStaffList.length, unit: "명", color: "bg-cyan-50 text-cyan-600", icon: <Icons.Users /> },
                { label: "금일 휴가자", value: todayLeaveCount, unit: "명", color: "bg-orange-50 text-orange-600", icon: <Icons.Briefcase /> },
                { label: "금년 연차 소진율", value: currentYearRate, unit: "%", color: "bg-purple-50 text-purple-600", icon: <Icons.CheckCircle /> },
            ];

            return (
                <div className="flex h-screen bg-[#F1F5F9] text-slate-800 font-sans overflow-hidden">
                    <ErrorBoundary>
                        <aside className="w-64 bg-[#1E293B] text-white flex flex-col z-10 shadow-xl">
                            <div className="p-4 border-b border-slate-700/50">
                                <div className="bg-white rounded-xl py-3 px-2 mb-2">
                                    <img src="./logo.jpg" alt="장애인사회연구소" className="h-10 mx-auto object-contain" />
                                </div>
                                <p className="text-xs text-slate-400 text-center font-bold">{user.name}님 환영합니다</p>
                            </div>
                            <nav className="flex-1 p-4 flex flex-col gap-2">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === 'dashboard' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><Icons.Grid /> 대시보드</button>
                                <button onClick={() => setActiveTab('leave')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === 'leave' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><Icons.Calendar /> 연차 관리</button>
                                <button onClick={() => setActiveTab('past_leave')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === 'past_leave' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><Icons.History /> 과년도 연차관리</button>
                                <button onClick={() => setActiveTab('promotion')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === 'promotion' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><Icons.Megaphone /> 미사용 연차 촉진</button>
                                <button onClick={() => setActiveTab('resigned')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === 'resigned' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><Icons.UserMinus /> 퇴사자 관리</button>
                                <button onClick={() => setActiveTab('staff')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === 'staff' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}><Icons.Users /> 직원 명부</button>
                            </nav>
                            <div className="p-4 bg-[#0F172A]">
                                <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 text-slate-400 hover:text-white text-xs font-bold py-2"><Icons.LogOut /> 로그아웃</button>
                                <p className="text-[10px] text-slate-500 text-center mt-4">Ver 9.3 (Fiscal Year)<br/>© 2026 Jangaein</p>
                            </div>
                        </aside>
                        <main className="flex-1 overflow-y-auto p-8 relative">
                            <header className="flex justify-between items-center mb-8"><h2 className="text-2xl font-bold text-slate-800">관리자 시스템</h2><div className="text-sm font-bold text-slate-500">{new Date().toLocaleDateString()}</div></header>
                            
                            {/* 대시보드 */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {DASHBOARD_STATS.map((s,i) => (
